<!DOCTYPE html>
<html>
<head>
    <title>Farmer Direct Market</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4fff4;
        }

        header {
            background: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #1b5e20;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            padding: 50px;
            text-align: center;
            background: url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854') no-repeat center;
            background-size: cover;
            color: white;
        }

        .products {
            padding: 30px;
            text-align: center;
        }

        .card {
            display: inline-block;
            width: 250px;
            margin: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: #2e7d32;
            color: white;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        footer {
            background: #1b5e20;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>Farmer Direct Market</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Register</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Buy Fresh Crops Directly from Farmers</h2>
    <p>No Middlemen. Better Price. Better Profit.</p>
</section>

<section class="products">
    <h2>Available Crops</h2>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
        <h3>Tomatoes</h3>
        <p>₹30/kg</p>
        <button onclick="alert('Contact Farmer: 9876543210')">Contact</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
        <h3>Potatoes</h3>
        <p>₹20/kg</p>
        <button onclick="alert('Contact Farmer: 9876543210')">Contact</button>
    </div>

</section>

<footer>
    <p>© 2026 Farmer Direct Market | Empowering Farmers</p>
</footer>

</body>
</html>
